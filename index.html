<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D1525" />
    <meta name="color-scheme" content="dark" />

    <!-- Content Security Policy. Permite: la propia app, Supabase (auth/db/storage/realtime),
         Mercado Pago (checkout), Google Fonts. Bloquea inyección de scripts externos.
         style 'unsafe-inline' requerido por Tailwind/estilos inline; img/connect amplios
         para covers de eventos (cualquier host) y APIs. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://www.mercadopago.com https://sdk.mercadopago.com https://challenges.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      media-src 'self' blob: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.mercadopago.com http://localhost:3000 https://*.trycloudflare.com https://*.ngrok-free.app;
      frame-src 'self' https://www.mercadopago.com https://challenges.cloudflare.com;
      worker-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <title>GESTEK — Event OS</title>
    <meta name="description" content="Plataforma SaaS de gestión de eventos con marca blanca: editor visual, tickets, QR check-in, chat, agenda, pagos Mercado Pago y recordatorios automáticos." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GESTEK" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GESTEK Event OS" />
    <meta property="og:title" content="GESTEK — Event OS" />
    <meta property="og:description" content="Plataforma SaaS para crear, vender y operar eventos con tu propia marca." />
    <meta property="og:image" content="/icon-512.svg" />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GESTEK — Event OS" />
    <meta name="twitter:description" content="Plataforma SaaS para crear, vender y operar eventos con tu propia marca." />
    <meta name="twitter:image" content="/icon-512.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
